  <!-- === STYLES & FONTS === -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/header.css" />

      body {

</head>

<body class="bg-white text-gray-900 overflow-x-hidden">
  <div id="header"></div>

  <main>
    <!-- Hero Section (unchanged) -->
    <section class="relative pt-60 pb-32 overflow-hidden bg-[#0a1633]">
      <div class="absolute inset-0 z-0">
        <img src="/assets/gallery/hero.jpg" alt="Gallery Hero" class="w-full h-full object-cover" />
        <div class="absolute inset-0 bg-[#0a1633]/70 mix-blend-multiply"></div>
      </div>
      <div class="container mx-auto px-6 text-center relative z-10">
        <div
          class="inline-block px-6 py-2 rounded-full bg-white/5 backdrop-blur-2xl text-white/90 text-[10px] font-bold tracking-[0.6em] uppercase mb-10 border border-white/10 shadow-2xl">
          Portfolio Archive
        </div>
        <h1 class="text-5xl md:text-7xl font-bold text-white mb-6 tracking-tight">
          OUR <span class="text-secondary">GALLERY</span>
        </h1>
        <p class="text-white/70 text-lg md:text-xl font-light max-w-2xl mx-auto leading-relaxed">
          A curated exhibition of our industrial installations and pumping solutions across Sudan.
        </p>
      </div>
    </section>

    <!-- Gallery Section -->
    <section class="py-20 bg-white" id="gallery">
      <div class="container mx-auto px-6">
        <!-- Filter buttons container (will be populated by JS) -->
        <div class="flex justify-center gap-2 mb-12 flex-wrap" id="filter-buttons"></div>

        <!-- Image grid container (will be populated by JS) -->
        <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      </div>
    </section>

    <!-- Call to action (unchanged) -->
    <section class="py-16 bg-[#fcfcfc] border-y border-gray-100">
      <div class="container mx-auto px-6 text-center">
        <h3 class="text-2xl font-bold text-main mb-3">Have a project in mind?</h3>
        <p class="text-gray-600 mb-6 max-w-xl mx-auto">
          Let's discuss how we can bring reliable pumping solutions to your site.
        </p>
        <a href="contact.html"
          class="inline-flex items-center gap-2 px-8 py-4 bg-main text-white rounded-full font-bold hover:bg-secondary transition-colors shadow-lg shadow-main/10">
          Contact Our Team
          <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <!-- LightGallery JS -->
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/thumbnail/lg-thumbnail.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/zoom/lg-zoom.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/fullscreen/lg-fullscreen.min.js"></script>

  <script>
    (async function () {
      // --- Configuration ---
      const SUPABASE_URL = 'https://alsmjjizeoquuciyuhaf.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsc21qaml6ZW9xdXVjaXl1aGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzMzMjAsImV4cCI6MjA4ODU0OTMyMH0.rjnOo6ToIOwGcuRzhgyE9pkff2s3KcHrRvextt7gdeQ';

      // Detect language
      const path = window.location.pathname;
      const isArabic = path.includes('-ar.') || path.includes('/ar/');

      // Category display names
      const categoryNames = {
        irrigation: { en: 'Irrigation', ar: 'الري' },
        industrial: { en: 'Industrial', ar: 'صناعي' },
        municipal: { en: 'Municipal', ar: 'بلدي' },
        installation: { en: 'Installation', ar: 'تركيب' }
      };

      // Initialize Supabase
      const { createClient } = supabase;
      const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // DOM elements
      const filterContainer = document.getElementById('filter-buttons');
      const gridContainer = document.getElementById('gallery-grid');

      // Fetch gallery items
      const { data: galleryItems, error } = await supabaseClient
        .from('gallery')
        .select('*')
        .order('order', { ascending: true });

      if (error) {
        console.error('Error fetching gallery:', error);
        gridContainer.innerHTML = '<p class="text-center col-span-full py-20">Failed to load gallery.</p>';
        return;
      }

      if (!galleryItems || galleryItems.length === 0) {
        gridContainer.innerHTML = '<p class="text-center col-span-full py-20">No gallery images yet.</p>';
        return;
      }

      // Unique categories for filter buttons
      const categories = [...new Set(galleryItems.map(item => item.category).filter(Boolean))];

      // Render filter buttons
      const allButtonText = isArabic ? 'الكل' : 'All';
      filterContainer.innerHTML = `
        <button class="filter-btn px-6 py-2 rounded-full bg-main text-white text-sm font-medium hover:bg-secondary transition" data-filter="all">
          ${allButtonText}
        </button>
        ${categories.map(cat => {
        const displayName = categoryNames[cat] ? categoryNames[cat][isArabic ? 'ar' : 'en'] : cat;
        return `
            <button class="filter-btn px-6 py-2 rounded-full bg-gray-100 text-gray-700 text-sm font-medium hover:bg-main hover:text-white transition" data-filter="${cat}">
              ${displayName}
            </button>
          `;
      }).join('')}
      `;

      // Render gallery items with enhanced hover and badge
      function renderGalleryItems(filter = 'all') {
        const filtered = filter === 'all' ? galleryItems : galleryItems.filter(item => item.category === filter);

        gridContainer.innerHTML = filtered.map(item => {
          const title = isArabic ? (item.title_ar || item.title_en) : (item.title_en || item.title_ar);
          const description = isArabic ? (item.description_ar || item.description_en) : (item.description_en || item.description_ar);
          const categoryDisplay = categoryNames[item.category] ? categoryNames[item.category][isArabic ? 'ar' : 'en'] : item.category;

          // Thumbnail with optimization
          const thumbnailUrl = item.image_url + '?width=600&quality=80';
          const fullUrl = item.image_url;

          // Hidden caption for lightGallery
          const captionHtml = `
            <div class="caption hidden">
              <h4>${title || ''}</h4>
              ${description ? `<p>${description}</p>` : ''}
            </div>
          `;

          return `
            <a href="${fullUrl}" class="gallery-item relative block" data-category="${item.category || ''}" data-sub-html=".caption">
              <div class="relative aspect-square group overflow-hidden rounded-xl border border-gray-100 hover:shadow-xl transition-shadow">
                <img src="${thumbnailUrl}" alt="${title || 'Gallery image'}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" />
                
                <!-- Category badge -->
                ${categoryDisplay ? `
                  <span class="absolute top-2 left-2 bg-main/90 text-white text-xs font-bold px-3 py-1 rounded-full backdrop-blur-sm z-10">
                    ${categoryDisplay}
                  </span>
                ` : ''}
                
                <!-- Hover overlay with title and view icon -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end items-center p-4">
                  ${title ? `<span class="text-white text-sm font-medium text-center mb-2">${title}</span>` : ''}
                  <span class="text-white text-[10px] font-bold uppercase tracking-widest bg-main px-3 py-1 rounded">View</span>
                </div>
              </div>
              ${captionHtml}
            </a>
          `;
        }).join('');
      }

      // Initial render
      renderGalleryItems('all');

      // Initialize lightGallery
      let gallery = lightGallery(gridContainer, {
        selector: '.gallery-item',
        plugins: [lgZoom, lgThumbnail, lgFullscreen],
        speed: 500,
        download: false,
        counter: true,
        thumbnail: true,
      });

      // Filter buttons
      const filterButtons = filterContainer.querySelectorAll('.filter-btn');
      filterButtons.forEach(button => {
        button.addEventListener('click', function () {
          filterButtons.forEach(btn => {
            btn.classList.remove('bg-main', 'text-white');
            btn.classList.add('bg-gray-100', 'text-gray-700');
          });
          this.classList.remove('bg-gray-100', 'text-gray-700');
          this.classList.add('bg-main', 'text-white');

          const filter = this.getAttribute('data-filter');
          renderGalleryItems(filter);

          // Reinitialize lightGallery after DOM update
          if (gallery) gallery.destroy();
          gallery = lightGallery(gridContainer, {
            selector: '.gallery-item',
            plugins: [lgZoom, lgThumbnail, lgFullscreen],
            speed: 500,
            download: false,
            counter: true,
            thumbnail: true,
          });
        });
      });
    })();
  </script>
</body>

</html>
