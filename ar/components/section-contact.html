<!-- /ar/components/section-contact.html -->
<div class="relative">
  <div class="waves-container bg-white text-main leading-[0]">
    <svg
      class="waves block w-full h-[12vh] min-h-[100px]"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 24 150 28"
      preserveAspectRatio="none"
      shape-rendering="geometricPrecision"
    >
      <defs>
        <path
          id="gentle-wave"
          d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z"
        />
      </defs>
      <g class="parallax">
        <use
          xlink:href="#gentle-wave"
          x="48"
          y="0"
          fill="currentColor"
          opacity="0.4"
        />
        <use xlink:href="#gentle-wave" x="48" y="7" fill="currentColor" />
      </g>
    </svg>
  </div>

  <section class="py-24 bg-main text-white relative overflow-hidden -mt-[2px]">
    <div
      class="absolute -top-24 -right-24 w-96 h-96 rounded-full blur-3xl"
    ></div>

    <div class="container mx-auto px-6 relative z-10">
      <div
        class="flex flex-col lg:flex-row items-center justify-between gap-16"
      >
        <!-- Left side (text) – RTL aligned -->
        <div class="lg:w-1/2 text-center lg:text-right space-y-8 reveal-left">
          <div>
            <div
              class="inline-block px-4 py-1 rounded-full bg-white/10 text-secondary text-xs tracking-[0.3em] uppercase mb-6 border border-white/10"
            >
              ابدأ الآن
            </div>
            <h2 class="text-4xl md:text-5xl font-bold leading-tight">
              هل تبحث عن حل موثوق <br /><span class="text-secondary"
                >لمضخات المياه؟</span
              >
            </h2>
            <p
              class="mt-0 text-gray-300 text-lg font-light max-w-xl mx-auto lg:mx-0 leading-relaxed"
            >
              فريقنا الهندسي جاهز لدعم بنيتك التحتية. تواصل معنا اليوم للحصول
              على استشارة فنية أو عرض سعر رسمي.
            </p>
          </div>

          <div class="grid sm:grid-cols-2 gap-6 pt-4">
            <div
              class="flex items-center gap-4 justify-center lg:justify-end group"
            >
              <div class="text-left">
                <p class="text-[10px] uppercase tracking-widest text-gray-400">
                  اتصل بنا
                </p>
                <p class="font-bold">+249 183 772033</p>
              </div>
              <div
                class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-secondary group-hover:bg-secondary group-hover:text-main transition-colors"
              >
                <i class="fa-solid fa-phone"></i>
              </div>
            </div>
            <div
              class="flex items-center gap-4 justify-center lg:justify-end group"
            >
              <div class="text-left">
                <p class="text-[10px] uppercase tracking-widest text-gray-400">
                  زر مكتبنا
                </p>
                <p class="font-bold">شارع الجمهورية، الخرطوم</p>
              </div>
              <div
                class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-secondary group-hover:bg-secondary group-hover:text-main transition-colors"
              >
                <i class="fa-solid fa-location-dot"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- Right side contact card -->
        <div class="lg:w-auto w-full reveal-left">
          <div
            class="bg-white p-8 md:p-12 rounded-[40px] shadow-2xl text-main text-center lg:text-right transform hover:-translate-y-2 transition-transform duration-500"
          >
            <h3 class="text-2xl font-bold mb-2">جاهز للحديث؟</h3>
            <p class="text-gray-500 mb-8 font-light">الرد خلال 24 ساعة عمل.</p>

            <div class="flex flex-col gap-4">
              <a
                href="/ar/contact-ar.html"
                class="flex items-center justify-center gap-3 bg-main text-white px-10 py-5 rounded-full font-bold shadow-lg hover:bg-secondary hover:text-main transition-all group"
              >
                <span>أرسل رسالة</span>
                <i
                  class="fa-solid fa-paper-plane group-hover:translate-x-1 transition-transform"
                ></i>
              </a>

              <div
                class="flex items-center justify-center gap-6 pt-4 border-t border-gray-100"
              >
                <span class="text-xs text-gray-400 uppercase tracking-tighter"
                  >دعم طوارئ:</span
                >
                <a
                  href="tel:+249912345678"
                  class="text-sm font-bold text-main hover:text-secondary"
                  >+249 912 345 678</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
