<!-- قسم الاتصال - Contact CTA (Arabic) -->
<div>
  <!-- الموجات (تبقى كما هي لأنها SVG ولا تحتوي على نص) -->
  <div class="waves-container text-main">
    <svg
      class="waves"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 24 150 28"
      preserveAspectRatio="none"
    >
      <defs>
        <path
          id="gentle-wave"
          d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z"
        />
      </defs>
      <g class="parallax">
        <use xlink:href="#gentle-wave" x="48" y="0" />
        <use xlink:href="#gentle-wave" x="48" y="7" />
      </g>
    </svg>
  </div>

  <section
    class="py-20 bg-main text-white text-center relative overflow-hidden"
  >
    <div class="container mx-auto px-4 relative z-10">
      <h2 class="text-3xl md:text-4xl font-bold">
        هل تبحث عن حل موثوق لمضخات المياه؟
      </h2>
      <p class="mt-4 text-secondary">
        اتصل بنا اليوم للحصول على استشارة أو عرض سعر
      </p>
      <a
        href="/ar/contact.html"
        class="mt-8 inline-block bg-white text-main px-10 py-4 rounded-full font-bold shadow-lg hover:bg-gray-100 transition-colors"
      >
        تواصل معنا
      </a>
    </div>
  </section>
</div>
