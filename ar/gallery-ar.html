  <body class="bg-white text-gray-900 overflow-x-hidden">

    <!-- LightGallery JS -->
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/thumbnail/lg-thumbnail.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/zoom/lg-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/plugins/fullscreen/lg-fullscreen.min.js"></script>

    <script>
      (async function () {
        // --- Configuration ---
        const SUPABASE_URL = "https://alsmjjizeoquuciyuhaf.supabase.co";
        const SUPABASE_ANON_KEY =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsc21qaml6ZW9xdXVjaXl1aGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzMzMjAsImV4cCI6MjA4ODU0OTMyMH0.rjnOo6ToIOwGcuRzhgyE9pkff2s3KcHrRvextt7gdeQ";

        // Detect language – for this page it's Arabic
        const isArabic = true;

        // Category display names (Arabic already)
        const categoryNames = {
          irrigation: { ar: "الري" },
          industrial: { ar: "صناعي" },
          municipal: { ar: "بلدي" },
          installation: { ar: "تركيب" },
        };

        // Initialize Supabase client
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM elements
        const filterContainer = document.getElementById("filter-buttons");
        const gridContainer = document.getElementById("gallery-grid");

        // Fetch gallery items
        const { data: galleryItems, error } = await supabaseClient
          .from("gallery")
          .select("*")
          .order("order", { ascending: true });

        if (error) {
          console.error("Error fetching gallery:", error);
          gridContainer.innerHTML =
            '<p class="text-center col-span-full py-20">فشل تحميل المعرض.</p>';
          return;
        }

        if (!galleryItems || galleryItems.length === 0) {
          gridContainer.innerHTML =
            '<p class="text-center col-span-full py-20">لا توجد صور في المعرض بعد.</p>';
          return;
        }

        // Unique categories
        const categories = [
          ...new Set(galleryItems.map((item) => item.category).filter(Boolean)),
        ];

        // Render filter buttons (Arabic)
        filterContainer.innerHTML = `
        <button class="filter-btn px-6 py-2 rounded-full bg-main text-white text-sm font-medium hover:bg-secondary transition" data-filter="all">
          الكل
        </button>
        ${categories
          .map((cat) => {
            const displayName = categoryNames[cat]?.ar || cat;
            return `
            <button class="filter-btn px-6 py-2 rounded-full bg-gray-100 text-gray-700 text-sm font-medium hover:bg-main hover:text-white transition" data-filter="${cat}">
              ${displayName}
            </button>
          `;
          })
          .join("")}
      `;

        // Helper to escape HTML
        function escapeHtml(unsafe) {
          if (!unsafe) return "";
          return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        // Render gallery items
        function renderGalleryItems(filter = "all") {
          const filtered =
            filter === "all"
              ? galleryItems
              : galleryItems.filter((item) => item.category === filter);

          gridContainer.innerHTML = filtered
            .map((item) => {
              const title = item.title_ar || item.title_en || "";
              const description =
                item.description_ar || item.description_en || "";
              const categoryDisplay =
                categoryNames[item.category]?.ar || item.category;

              const thumbnailUrl = item.image_url + "?width=600&quality=80";
              const fullUrl = item.image_url;

              // Build caption HTML (escaped)
              const caption = `<h4>${escapeHtml(title)}</h4>${description ? `<p>${escapeHtml(description)}</p>` : ""}`;

              return `
            <a href="${fullUrl}" class="gallery-item relative block" data-category="${item.category || ""}" data-sub-html="${caption.replace(/"/g, "&quot;")}">
              <div class="relative aspect-square group overflow-hidden rounded-xl border border-gray-100 hover:shadow-xl transition-shadow">
                <img src="${thumbnailUrl}" alt="${escapeHtml(title || "صورة المعرض")}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" />
                
                ${
                  categoryDisplay
                    ? `
                  <span class="absolute top-2 left-2 bg-main/90 text-white text-xs font-bold px-3 py-1 rounded-full backdrop-blur-sm z-10">
                    ${escapeHtml(categoryDisplay)}
                  </span>
                `
                    : ""
                }
                
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end items-center p-4">
                  ${title ? `<span class="text-white text-sm font-medium text-center mb-2">${escapeHtml(title)}</span>` : ""}
                  <span class="text-white text-[10px] font-bold uppercase tracking-widest bg-main px-3 py-1 rounded">عرض</span>
                </div>
              </div>
            </a>
          `;
            })
            .join("");
        }

        // Initial render
        renderGalleryItems("all");

        // Initialize lightGallery
        let gallery = lightGallery(gridContainer, {
          selector: ".gallery-item",
          plugins: [lgZoom, lgThumbnail, lgFullscreen],
          speed: 500,
          download: false,
          counter: true,
          thumbnail: true,
        });

        // Filter buttons
        const filterButtons = filterContainer.querySelectorAll(".filter-btn");
        filterButtons.forEach((button) => {
          button.addEventListener("click", function () {
            filterButtons.forEach((btn) => {
              btn.classList.remove("bg-main", "text-white");
              btn.classList.add("bg-gray-100", "text-gray-700");
            });
            this.classList.remove("bg-gray-100", "text-gray-700");
            this.classList.add("bg-main", "text-white");

            const filter = this.getAttribute("data-filter");
            renderGalleryItems(filter);

            if (gallery) gallery.destroy();
            gallery = lightGallery(gridContainer, {
              selector: ".gallery-item",
              plugins: [lgZoom, lgThumbnail, lgFullscreen],
              speed: 500,
              download: false,
              counter: true,
              thumbnail: true,
            });
          });
        });
      })();
    </script>
