# netlify.toml

[build]
  publish = "."

# Arabic language routing
[[redirects]]
  from = "/ar/"
  to = "/index-ar.html"
  status = 200
  force = true

[[redirects]]
  from = "/ar/*"
  to = "/:splat-ar.html"
  status = 200
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"