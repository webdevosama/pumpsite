<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المنتجات | إبراهيم أبو حسانين وشركاه – مضخات صناعية وزراعية</title>

  <meta name="keywords" content="مضخات السودان, مضخات غاطسة, مضخات صناعية, مضخات ري, مضخات كابراري, مضخات طرد مركزي" />
  <meta name="author" content="إبراهيم أبو حسانين وشركاه" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://abuhassanien.netlify.app/products-ar.html" />

  <!-- === OPEN GRAPH === -->
  <meta property="og:title" content="المنتجات – إبراهيم أبو حسانين وشركاه" />
  <meta property="og:description" content="حلول ضخ عالية الأداء لصناعات ومزارع السودان." />
  <meta property="og:url" content="https://abuhassanien.netlify.app/products-ar.html" />
  <meta property="og:image" content="https://abuhassanien.netlify.app/assets/og-image-products.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ar_AR" />

  <!-- === TWITTER CARD === -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="المنتجات – إبراهيم أبو حسانين وشركاه" />
  <meta name="twitter:description" content="مضخات صناعية وزراعية وبلدية." />
  <meta name="twitter:image" content="https://abuhassanien.netlify.app/assets/og-image-products.jpg" />

  <!-- === FAVICON === -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />

  <!-- === SCHEMA.ORG (ItemList) – ARABIC === -->
  <script type="application/ld+json" id="product-schema">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "كتالوج منتجات إبراهيم أبو حسانين وشركاه",
      "description": "مجموعتنا من حلول الضخ للمياه والغاز والنفط.",
      "numberOfItems": 0,
      "itemListElement": []
    }
  </script>

  <!-- === STYLES & FONTS === -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/header.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- === SCRIPTS === -->
  <script type="module" src="/js/main.js"></script>
  <noscript><style>body { opacity: 1; }</style></noscript>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">
  <div id="header"></div>

  <!-- Hero Section (Arabic) -->
  <section class="relative pt-32 pb-20 bg-slate-50 border-b border-gray-100">
    <div class="container mx-auto px-6 text-center">
      <div class="inline-block px-4 py-1 rounded-full bg-main/5 text-main text-xs font-bold tracking-[0.3em] uppercase mb-6 border border-main/10">
        مجموعة صناعية
      </div>
      <h1 class="text-5xl md:text-7xl font-bold text-main mb-6 tracking-tight">
        هندسة <span class="text-secondary">بلا حدود.</span>
      </h1>
      <p class="text-gray-500 text-lg md:text-xl font-light max-w-2xl mx-auto leading-relaxed">
        اكتشف مجموعتنا من حلول الضخ عالية الأداء، المصممة لأقسى البيئات في السودان.
      </p>
    </div>
  </section>

  <!-- Sticky Filter Bars -->
  <div class="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-gray-100 py-4">
    <div class="container mx-auto px-6 space-y-4">
      <!-- Category filter -->
      <div class="flex flex-col md:flex-row justify-between items-center gap-3">
        <div class="flex flex-wrap justify-center gap-2">
          <button class="filter-cat-btn active px-6 py-2 rounded-full bg-main text-white text-sm font-bold" data-category="all">جميع الفئات</button>
          <button class="filter-cat-btn px-6 py-2 rounded-full border border-gray-200 text-gray-500 text-sm font-medium hover:border-main hover:text-main transition-all" data-category="submersible">غاطسة</button>
          <button class="filter-cat-btn px-6 py-2 rounded-full border border-gray-200 text-gray-500 text-sm font-medium hover:border-main hover:text-main transition-all" data-category="industrial">صناعية</button>
          <button class="filter-cat-btn px-6 py-2 rounded-full border border-gray-200 text-gray-500 text-sm font-medium hover:border-main hover:text-main transition-all" data-category="irrigation">ري</button>
          <button class="filter-cat-btn px-6 py-2 rounded-full border border-gray-200 text-gray-500 text-sm font-medium hover:border-main hover:text-main transition-all" data-category="drinking">مياه شرب</button>
        </div>
        <span class="text-xs text-gray-400 font-mono uppercase tracking-widest">تصفية حسب الفئة</span>
      </div>

      <!-- Brand filter -->
      <div class="flex flex-col md:flex-row justify-between items-center gap-3">
        <div class="flex flex-wrap justify-center gap-2" id="brand-filter-container">
          <!-- JS will populate -->
        </div>
        <span class="text-xs text-gray-400 font-mono uppercase tracking-widest">تصفية حسب العلامة التجارية</span>
      </div>
    </div>
  </div>

  <!-- Product Grid -->
  <main class="py-16 bg-white">
    <div class="container mx-auto px-6">
      <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>
  </main>

  <!-- Full‑page Detail Overlay -->
  <div id="product-detail-view" class="fixed inset-0 z-[100] hidden overflow-y-auto bg-white">
    <button onclick="closeDetailView()" class="fixed top-8 left-8 z-[110] w-12 h-12 bg-main text-white rounded-full flex items-center justify-center hover:bg-secondary transition-all shadow-xl">
      <i class="fa-solid fa-xmark text-xl"></i>
    </button>
    <div class="min-h-screen flex flex-col lg:flex-row">
      <div class="lg:w-1/2 bg-[#f8f9fa] flex items-center justify-center p-12 relative">
        <span id="detail-bg-number" class="absolute top-20 right-20 text-[20rem] font-black text-gray-200/40 select-none">01</span>
        <img id="detail-img" src="" class="relative z-10 max-h-[70vh] object-contain drop-shadow-2xl" alt="" />
      </div>
      <div class="lg:w-1/2 p-8 md:p-20 flex flex-col justify-center">
        <div class="max-w-xl">
          <div class="flex items-center gap-3 mb-6">
            <span class="px-3 py-1 bg-secondary/10 text-secondary text-xs font-bold uppercase tracking-widest rounded">هندسة دقيقة</span>
            <span id="detail-category" class="text-xs font-bold text-gray-400 uppercase tracking-widest">غاطسة</span>
          </div>
          <h2 id="detail-title" class="text-4xl md:text-6xl font-bold text-main mb-6 tracking-tight">كابراري E-Series</h2>
          <p id="detail-long-desc" class="text-gray-500 text-lg leading-relaxed mb-10">وصف مفصل...</p>
          <div id="detail-spec-grid" class="grid grid-cols-2 gap-6 mb-12 border-t border-b border-gray-100 py-8"></div>
          <div class="flex flex-col sm:flex-row gap-4">
            <a href="mailto:sales@abuhassanien.com" class="flex-1 px-8 py-5 bg-main text-white text-center rounded-2xl font-bold hover:bg-secondary transition-all shadow-lg shadow-main/20">
              طلب عرض سعر فني
            </a>
            <button class="px-8 py-5 border border-gray-200 text-main rounded-2xl font-bold hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
              <i class="fa-solid fa-file-pdf"></i> تحميل كتيب المواصفات
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script>
    // ---------- PRODUCT DATABASE (ARABIC) ----------
    const products = [
      {
        id: 1,
        brand: 'Caprari',
        category: 'submersible',
        title: 'كابراري E-Series غاطسة',
        shortDesc: 'مضخات آبار إيطالية فاخرة لاستخراج المياه العميقة.',
        longDesc: 'مضخات كابراري E-Series الغاطسة مصممة لتطبيقات الآبار العميقة. تتميز بهيكل من الستانلس ستيل، محركات عالية الكفاءة، وتصميم هيدروليكي متقدم لأداء موثوق في الظروف القاسية.',
        image: '/assets/gallery/7.png',
        number: '01',
        specs: {
          "أقصى تدفق": "350 لتر/ث",
          "أقصى رفع": "450 م",
          "الخامات": "حديد زهر / ستانلس",
          "الطاقة": "حتى 400 كيلوواط"
        }
      },
      {
        id: 2,
        brand: 'Felm',
        category: 'industrial',
        title: 'Felm NC Series طرد مركزي',
        shortDesc: 'مضخة طرد مركزي ثقيلة للاستخدام الصناعي المستمر.',
        longDesc: 'مصممة للخدمة المستمرة في التبريد الصناعي، إمدادات المياه، والأنظمة المضغوطة. قوية وسهلة الصيانة. معدل تدفق يصل إلى 1000 متر مكعب/ساعة، رفع يصل إلى 120 متر.',
        image: '/assets/gallery/1.jfif',
        number: '02',
        specs: {
          "أقصى تدفق": "1000 م³/س",
          "أقصى رفع": "120 م",
          "الخامات": "حديد زهر / ستانلس",
          "الطاقة": "حتى 500 كيلوواط"
        }
      },
      {
        id: 3,
        brand: 'Sigma',
        category: 'irrigation',
        title: 'Sigma Mixed-Flow للري',
        shortDesc: 'مضخة مختلطة التدفق عالية الكفاءة للمشاريع الزراعية الكبيرة.',
        longDesc: 'محسنة للري بالغمر والمحاور المركزية. أداء ممتاز عند الرفع المتوسط مع استهلاك منخفض للطاقة. طلاء مقاوم للتآكل لعمر طويل.',
        image: '/assets/gallery/4.jfif',
        number: '03',
        specs: {
          "أقصى تدفق": "800 م³/س",
          "أقصى رفع": "40 م",
          "الخامات": "حديد زهر مع إيبوكسي",
          "الكفاءة": "تصل إلى 85٪"
        }
      },
      {
        id: 4,
        brand: 'Sapar',
        category: 'drinking',
        title: 'Sapar معزز مياه الشرب',
        shortDesc: 'أنظمة معززات متعددة المضخات لإمدادات المياه البلدية.',
        longDesc: 'تكوين متعدد المضخات مع محركات متغيرة التردد. ضغط ثابت، موثوقية عالية. متوافق مع معايير مياه الشرب.',
        image: '/assets/gallery/2.jfif',
        number: '04',
        specs: {
          "أقصى تدفق": "600 م³/س",
          "أقصى رفع": "100 م",
          "المضخات": "حتى 6 على التوازي",
          "التحكم": "محرك متغير التردد"
        }
      },
      {
        id: 5,
        brand: 'Iran Pumps',
        category: 'submersible',
        title: 'Iran Pumps آبار عميقة',
        shortDesc: 'مضخة قوية للآبار العميقة حتى 300 متر.',
        longDesc: 'مصممة لتحمل الرمال والجسيمات الكاشطة. متوفرة بأقطار 4 و 6 و 8 بوصات بمعدلات تدفق من 5 إلى 200 متر مكعب/ساعة.',
        image: '/assets/gallery/3.jfif',
        number: '05',
        specs: {
          "أقصى عمق": "300 م",
          "نطاق التدفق": "5-200 م³/س",
          "الأقطار": "4-8 بوصات",
          "التركيب": "مقاوم للجسيمات"
        }
      },
      {
        id: 6,
        brand: 'Ocean Pumps',
        category: 'industrial',
        title: 'Ocean Vertical Turbine',
        shortDesc: 'مضخة توربينية رأسية متعددة المراحل لسحب المياه الصناعي.',
        longDesc: 'تصميم متعدد المراحل مع دفاعات مغلقة. يمكن تركيبها في الآبار أو الأحواض أو المسطحات المائية المفتوحة. أطوال وخامات قابلة للتخصيص.',
        image: '/assets/gallery/5.jfif',
        number: '06',
        specs: {
          "أقصى تدفق": "800 م³/س",
          "أقصى رفع": "200 م",
          "المراحل": "متعددة المراحل",
          "التخصيص": "أطوال وخامات"
        }
      }
    ];

    // ---------- STATE ----------
    let currentCategory = 'all';
    let currentBrand = 'all';

    // DOM Elements
    const productGrid = document.getElementById('product-grid');
    const catFilterBtns = document.querySelectorAll('.filter-cat-btn');
    const brandFilterContainer = document.getElementById('brand-filter-container');
    const detailView = document.getElementById('product-detail-view');

    // Extract unique brands
    const uniqueBrands = ['all', ...new Set(products.map(p => p.brand))];

    // Render brand filter buttons
    function renderBrandFilters() {
      brandFilterContainer.innerHTML = uniqueBrands.map(brand => {
        const isActive = (brand === currentBrand);
        const activeClass = isActive ? 'bg-main text-white' : 'border border-gray-200 text-gray-500 hover:border-main hover:text-main';
        return `
          <button class="filter-brand-btn px-6 py-2 rounded-full text-sm font-medium transition-all ${activeClass}" data-brand="${brand}">
            ${brand === 'all' ? 'جميع العلامات' : brand}
          </button>
        `;
      }).join('');

      // Attach listeners
      document.querySelectorAll('.filter-brand-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-brand-btn').forEach(b => {
            b.classList.remove('bg-main', 'text-white');
            b.classList.add('border', 'border-gray-200', 'text-gray-500');
          });
          btn.classList.add('bg-main', 'text-white');
          btn.classList.remove('border', 'border-gray-200', 'text-gray-500');

          currentBrand = btn.getAttribute('data-brand');
          filterProducts();
        });
      });
    }

    // Filter products
    function filterProducts() {
      let filtered = products;

      if (currentCategory !== 'all') {
        filtered = filtered.filter(p => p.category === currentCategory);
      }
      if (currentBrand !== 'all') {
        filtered = filtered.filter(p => p.brand === currentBrand);
      }

      renderGrid(filtered);
    }

    // Render grid
    function renderGrid(filtered) {
      if (filtered.length === 0) {
        productGrid.innerHTML = `<p class="text-center text-gray-500 col-span-full py-20">لا توجد منتجات تطابق اختيارك.</p>`;
        return;
      }

      productGrid.innerHTML = filtered.map(p => {
        // Translate category for display
        let catDisplay = '';
        switch(p.category) {
          case 'submersible': catDisplay = 'غاطسة'; break;
          case 'industrial': catDisplay = 'صناعية'; break;
          case 'irrigation': catDisplay = 'ري'; break;
          case 'drinking': catDisplay = 'مياه شرب'; break;
          default: catDisplay = p.category;
        }
        return `
        <div onclick="openDetailView(${p.id})" class="group cursor-pointer bg-white rounded-3xl border border-gray-100 p-6 hover:shadow-2xl transition-all duration-500">
          <div class="h-64 bg-slate-50 rounded-2xl flex items-center justify-center mb-6 relative overflow-hidden">
            <img src="${p.image}" loading="lazy" class="h-48 object-contain group-hover:scale-110 transition-transform duration-500" alt="${p.title}">
            <div class="absolute top-2 left-2 bg-white/80 backdrop-blur-sm px-2 py-1 rounded-full text-xs font-bold text-main border border-gray-200">
              ${p.brand}
            </div>
          </div>
          <p class="text-secondary text-xs font-bold uppercase tracking-widest mb-2">${catDisplay}</p>
          <h3 class="text-xl font-bold text-main mb-2">${p.title}</h3>
          <p class="text-gray-500 text-sm mb-4">${p.shortDesc}</p>
          <div class="flex justify-between items-center text-xs font-mono text-gray-400">
            <span>موديل: ${p.number}</span>
            <span class="text-main font-bold">عرض التفاصيل ←</span>
          </div>
        </div>
      `}).join('');
    }

    // Category filters
    catFilterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        catFilterBtns.forEach(b => {
          b.classList.remove('bg-main', 'text-white');
          b.classList.add('border', 'border-gray-200', 'text-gray-500');
        });
        btn.classList.add('bg-main', 'text-white');
        btn.classList.remove('border', 'border-gray-200', 'text-gray-500');

        currentCategory = btn.getAttribute('data-category');
        filterProducts();
      });
    });

    // Detail view
    window.openDetailView = function(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      document.getElementById('detail-img').src = product.image;
      document.getElementById('detail-title').innerText = product.title;
      document.getElementById('detail-long-desc').innerText = product.longDesc;
      // Translate category for detail
      let catDisplay = '';
      switch(product.category) {
        case 'submersible': catDisplay = 'غاطسة'; break;
        case 'industrial': catDisplay = 'صناعية'; break;
        case 'irrigation': catDisplay = 'ري'; break;
        case 'drinking': catDisplay = 'مياه شرب'; break;
        default: catDisplay = product.category;
      }
      document.getElementById('detail-category').innerText = catDisplay;
      document.getElementById('detail-bg-number').innerText = product.number;

      const specGrid = document.getElementById('detail-spec-grid');
      specGrid.innerHTML = Object.entries(product.specs).map(([key, value]) => `
        <div>
          <p class="text-xs text-gray-400 uppercase font-bold mb-1">${key}</p>
          <p class="text-xl font-bold text-main">${value}</p>
        </div>
      `).join('');

      detailView.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    };

    window.closeDetailView = function() {
      detailView.classList.add('hidden');
      document.body.style.overflow = 'auto';
    };

    // Initialise
    renderBrandFilters();
    filterProducts();
  </script>
</body>
</html>
